<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>P.L.A.N. Bonus Calculator</title>
  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: #fffbea;
      margin: 40px;
      color: #444;
    }
    h2 {
      color: #f4b400;
      text-align: center;
    }
    .container {
      max-width: 500px;
      margin: auto;
      background: #fffef5;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      border: 3px solid #ffe066;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 15px;
    }
    label {
      flex: 1;
    }
    input[type="number"] {
      flex: 1;
      padding: 8px;
      border: 2px solid #ffd43b;
      border-radius: 8px;
      background: #fff9db;
    }
    .checkboxes {
      display: flex;
      flex-direction: column;
      margin-left: 20px;
    }
    .checkboxes label {
      margin: 5px 0;
      background: #fff3bf;
      padding: 5px;
      border-radius: 6px;
    }
    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #f4b400;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover {
      background: #ffd43b;
      color: #333;
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
      color: #e67700;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>🌞 P.L.A.N. Bonus Calculator 🌞</h2>

    <div class="row">
      <label>NSC (Last 3 Months):</label>
      <input type="number" id="nsc" placeholder="Enter NSC">
    </div>

    <div class="row">
      <label>AC (This Month):</label>
      <input type="number" id="ac" placeholder="Enter AC">
    </div>

    <div class="row">
      <label>Lives (Last Month):</label>
      <input type="number" id="lives" placeholder="Enter Lives">
    </div>

    <div class="row">
      <label>Persistency:</label>
      <div class="checkboxes">
        <label><input type="radio" name="persistency" value="w/o13" checked> w/o 13th month</label>
        <label><input type="radio" name="persistency" value="with13"> with 13th month</label>
        <label><input type="radio" name="persistency" value="25th80"> 25th month (80%)</label>
        <label><input type="radio" name="persistency" value="25th90"> 25th month (90%)</label>
      </div>
    </div>

    <button onclick="calculateBonus()">✨ Compute Bonus ✨</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    function getTableAPercentage(nsc, persistency) {
      let pct = 0;
      if (nsc >= 500000) {
        pct = { 'w/o13': 30, 'with13': 35, '25th80': 40, '25th90': 50 }[persistency];
      } else if (nsc >= 300000) {
        pct = { 'w/o13': 23, 'with13': 27, '25th80': 30, '25th90': 40 }[persistency];
      } else if (nsc >= 200000) {
        pct = { 'w/o13': 18, 'with13': 21, '25th80': 24, '25th90': 32 }[persistency];
      } else if (nsc >= 100000) {
        pct = { 'w/o13': 14, 'with13': 17, '25th80': 20, '25th90': 26 }[persistency];
      } else if (nsc >= 50000) {
        pct = { 'w/o13': 12, 'with13': 15, '25th80': 18, '25th90': 23 }[persistency];
      }
      return pct;
    }

    function getTableBPercentage(nsc, lives) {
      if (nsc < 50000) return 0;
      if (lives >= 9) return 20;
      if (lives >= 7) return 14;
      if (lives >= 5) return 9;
      if (lives >= 3) return 5;
      return 0;
    }

    function calculateBonus() {
      const nsc = parseFloat(document.getElementById('nsc').value);
      const ac = parseFloat(document.getElementById('ac').value);
      const lives = parseInt(document.getElementById('lives').value);
      const persistency = document.querySelector('input[name="persistency"]:checked').value;

      const tableA = getTableAPercentage(nsc, persistency);
      const tableB = getTableBPercentage(nsc, lives);
      const totalPct = tableA + tableB;
      const bonus = ac * (totalPct / 100);

      document.getElementById('result').innerHTML =
        `🍯 Table A: ${tableA}%<br>🍯 Table B: ${tableB}%<br>🍯 Total Bonus: ${totalPct}%<br><br>🌻 Bonus Amount: ₱${bonus.toFixed(2)}`;
    }
  </script>
</body>
</html>
